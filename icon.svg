<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fond dégradé bleu -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1D4ED8"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
    <linearGradient id="car_grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E0EAFF;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Fond arrondi -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  
  <!-- Carrosserie principale -->
  <rect x="96" y="270" width="320" height="90" rx="18" fill="url(#car_grad)"/>
  
  <!-- Toit / habitacle -->
  <path d="M170 270 Q185 210 230 200 L282 200 Q327 210 342 270 Z" fill="url(#car_grad)"/>
  
  <!-- Vitre -->
  <path d="M186 268 Q196 228 232 220 L280 220 Q316 228 326 268 Z" fill="#93C5FD" opacity="0.7"/>
  
  <!-- Roue gauche -->
  <circle cx="168" cy="360" r="42" fill="#1E3A8A"/>
  <circle cx="168" cy="360" r="26" fill="#DBEAFE"/>
  <circle cx="168" cy="360" r="10" fill="#1E3A8A"/>
  
  <!-- Roue droite -->
  <circle cx="344" cy="360" r="42" fill="#1E3A8A"/>
  <circle cx="344" cy="360" r="26" fill="#DBEAFE"/>
  <circle cx="344" cy="360" r="10" fill="#1E3A8A"/>
  
  <!-- Phare gauche -->
  <rect x="100" y="290" width="36" height="20" rx="6" fill="#FCD34D"/>
  
  <!-- Phare droit -->
  <rect x="376" y="290" width="36" height="20" rx="6" fill="#FCD34D"/>
  
  <!-- Calandre -->
  <rect x="216" y="295" width="80" height="14" rx="4" fill="#93C5FD" opacity="0.5"/>
  
  <!-- Lettres AC en bas -->
  <text x="256" y="178" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="white" text-anchor="middle" opacity="0.95">AC</text>
  
  <!-- Petite ligne déco sous AC -->
  <rect x="206" y="185" width="100" height="4" rx="2" fill="white" opacity="0.4"/>
</svg>